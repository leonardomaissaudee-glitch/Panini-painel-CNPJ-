    <script>
      // Hotfix: evita crash "NotFoundError: Failed to execute 'removeChild' on 'Node'"
      // causado por race condition durante troca de etapas no checkout.
      (function () {
        const _removeChild = Node.prototype.removeChild;
        Node.prototype.removeChild = function (child) {
          try {
            return _removeChild.call(this, child);
          } catch (e) {
            if (e && e.name === "NotFoundError") return child;
            throw e;
          }
        };
      })();
    </script>
